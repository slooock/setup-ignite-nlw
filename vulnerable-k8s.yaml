apiVersion: v1
kind: Pod
metadata:
  name: vulnerable-pod
  labels:
    app: vulnerable
spec:
  hostNetwork: true
  hostPID: true
  hostIPC: true
  containers:
  - name: vulnerable-container
    image: nginx:latest
    securityContext:
      privileged: true
      runAsNonRoot: false
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
    volumeMounts:
    - mountPath: /host
      name: host-root
  volumes:
  - name: host-root
    hostPath:
      path: /
